# Render.com deployment — backend + frontend
services:
  # ── FastAPI Backend ──
  - type: web
    name: pharmai-api
    runtime: python
    region: singapore
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./pharmacy.db
      - key: APP_ENV
        value: production
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: none
      - key: CORS_ORIGINS
        sync: false  # set after frontend deploys
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: ELEVENLABS_AGENT_ID
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOW_DEMO_BYPASS
        value: "true"
      - key: MOCK_MODE
        value: "false"
      - key: PAYMENT_ENABLED
        value: "true"

  # ── Vite Frontend (Static Site) ──
  - type: web
    name: pharmai-app
    runtime: static
    rootDir: frontend_v2
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        sync: false  # set to https://pharmai-api.onrender.com/api
      - key: VITE_ELEVENLABS_AGENT_ID
        value: agent_8001kjsqz4dqe7ms98t9pk8syem9
