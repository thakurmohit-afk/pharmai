# Render.com deployment config for FastAPI backend
services:
  - type: web
    name: pharmadash-api
    runtime: python
    region: singapore  # closest to India for hackathon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./pharmacy.db
      - key: APP_ENV
        value: production
      - key: CORS_ORIGINS
        sync: false  # set manually after frontend deploys
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: ELEVENLABS_AGENT_ID
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOW_DEMO_BYPASS
        value: "true"
      - key: MOCK_MODE
        value: "false"
      - key: PAYMENT_ENABLED
        value: "true"
